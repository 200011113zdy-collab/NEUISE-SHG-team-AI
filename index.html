<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队 AI 助手</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f6f2;
    --sidebar:#efede8;
    --white:#ffffff;
    --border:#e2dfd8;
    --text:#1a1a18;
    --muted:#7a7870;
    --accent:#c96a3b;
    --accent-light:#fdf0e8;
    --user-bubble:#1a1a18;
    --user-text:#f7f6f2;
    --radius:14px;
  }
  body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

  .sidebar{width:220px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
  .sidebar-header{padding:20px 18px 12px;border-bottom:1px solid var(--border)}
  .brand{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
  .brand-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
  .sidebar-label{font-size:11px;color:var(--muted);letter-spacing:0.6px;text-transform:uppercase;padding:16px 18px 8px}
  .new-chat-btn{margin:0 12px 4px;padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--muted);cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all 0.15s}
  .new-chat-btn:hover{background:var(--white);color:var(--text)}
  .chat-list{flex:1;overflow-y:auto;padding:0 12px 12px}
  .chat-item{padding:9px 10px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
  .chat-item:hover{background:var(--white);color:var(--text)}
  .chat-item.active{background:var(--white);color:var(--text)}
  .sidebar-footer{padding:12px;border-top:1px solid var(--border)}
  .user-info{display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:8px;cursor:pointer}
  .user-info:hover{background:var(--white)}
  .avatar{width:30px;height:30px;background:var(--user-bubble);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--user-text);font-weight:500;flex-shrink:0}
  .user-name{font-size:13px;font-weight:500}
  .user-sub{font-size:11px;color:var(--muted)}

  .main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}
  .topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;background:var(--white);flex-shrink:0}
  .model-badge{background:var(--accent-light);color:var(--accent);font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
  .topbar-title{font-size:14px;color:var(--muted)}

  .messages{flex:1;overflow-y:auto;padding:32px 0;display:flex;flex-direction:column}
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .msg-wrap{display:flex;padding:6px 32px;gap:14px;max-width:860px;margin:0 auto;width:100%}
  .msg-wrap.user{flex-direction:row-reverse}
  .msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
  .msg-avatar.ai{background:var(--accent-light);color:var(--accent)}
  .msg-avatar.user{background:var(--user-bubble);color:var(--user-text)}
  .bubble{padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.8;max-width:72%;word-break:break-word;white-space:pre-wrap}
  .bubble.ai{background:var(--white);border:1px solid var(--border);color:var(--text);border-top-left-radius:4px}
  .bubble.user{background:var(--user-bubble);color:var(--user-text);border-top-right-radius:4px}

  .typing{display:flex;gap:4px;align-items:center;padding:14px 16px}
  .dot{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite}
  .dot:nth-child(2){animation-delay:0.2s}
  .dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px 24px;max-width:640px;margin:0 auto;width:100%}
  .welcome-title{font-size:26px;font-weight:600;color:var(--text);text-align:center}
  .welcome-sub{font-size:14px;color:var(--muted);text-align:center;line-height:1.6}
  .suggestions{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
  .sug-btn{padding:14px 16px;background:var(--white);border:1px solid var(--border);border-radius:12px;font-size:13px;color:var(--text);cursor:pointer;text-align:left;transition:all 0.15s;line-height:1.5;font-family:inherit}
  .sug-btn:hover{border-color:var(--accent);background:var(--accent-light)}

  .input-area{padding:16px 24px 20px;border-top:1px solid var(--border);background:var(--white);flex-shrink:0}
  .input-wrap{max-width:860px;margin:0 auto;background:var(--bg);border:1px solid var(--border);border-radius:16px;display:flex;align-items:flex-end;gap:8px;padding:10px 12px;transition:border-color 0.15s}
  .input-wrap:focus-within{border-color:#aaa8a0}
  textarea{flex:1;background:transparent;border:none;outline:none;resize:none;font-family:inherit;font-size:14px;color:var(--text);line-height:1.6;max-height:140px;min-height:24px}
  textarea::placeholder{color:var(--muted)}
  .send-btn{width:34px;height:34px;background:var(--user-bubble);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s;opacity:0.35}
  .send-btn.active{opacity:1}
  .input-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;max-width:860px;margin-left:auto;margin-right:auto}

  .api-modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
  .api-box{background:var(--white);border-radius:18px;padding:32px;width:420px;max-width:90vw}
  .api-box h2{font-size:18px;font-weight:600;margin-bottom:8px}
  .api-box p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6}
  .api-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:12px}
  .api-input:focus{border-color:var(--accent)}
  .api-btn{width:100%;padding:11px;background:var(--user-bubble);color:var(--user-text);border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
  .api-btn:hover{opacity:0.85}
</style>
</head>
<body>

<!-- API Key 弹窗 -->
<div class="api-modal" id="apiModal">
  <div class="api-box">
    <h2>输入 API Key</h2>
    <p>请输入你的 Anthropic API Key 以开始使用。Key 只存在你的浏览器中，不会上传到任何服务器。</p>
    <input class="api-input" id="apiKeyInput" type="password" placeholder="sk-ant-..." />
    <button class="api-btn" onclick="saveKey()">开始使用</button>
  </div>
</div>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="brand"><div class="brand-dot"></div>团队 AI 助手</div>
  </div>
  <div class="sidebar-label">对话</div>
  <button class="new-chat-btn" onclick="newChat()">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新对话
  </button>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar">我</div>
      <div>
        <div class="user-name">团队成员</div>
        <div class="user-sub" id="keyStatus">未配置 Key</div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">新对话</div>
    <div class="model-badge">Claude Sonnet 4.6</div>
  </div>
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-title">你好，今天需要什么帮助？</div>
      <div class="welcome-sub">基于 Claude Sonnet 4.6 · 团队共用 · 开梯子即可访问</div>
      <div class="suggestions">
        <button class="sug-btn" onclick="suggest('帮我写一封给客户的道歉邮件，语气专业但诚恳')">✉️ 帮我写一封客户邮件</button>
        <button class="sug-btn" onclick="suggest('用简单易懂的话解释一下什么是人工智能')">💡 解释一个复杂概念</button>
        <button class="sug-btn" onclick="suggest('帮我列一个这周的工作计划，包括优先级排序')">📋 整理工作计划</button>
        <button class="sug-btn" onclick="suggest('帮我把这段话翻译成英文：今天天气不错，适合外出')">🌐 中英文翻译</button>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="输入问题，按 Enter 发送..." rows="1" onkeydown="handleKey(event)" oninput="handleInput(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">
        <svg width="15" height="15" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
    <div class="input-hint">AI 可能出错，重要信息请自行核实</div>
  </div>
</div>

<script>
let history = [], sessions = [], currentSession = null, isLoading = false;
let apiKey = localStorage.getItem('team_ai_key') || '';

function init(){
  if(apiKey){ document.getElementById('apiModal').style.display='none'; document.getElementById('keyStatus').textContent='已配置'; }
}
init();

function saveKey(){
  const k = document.getElementById('apiKeyInput').value.trim();
  if(!k){ alert('请输入 API Key'); return; }
  apiKey = k;
  localStorage.setItem('team_ai_key', k);
  document.getElementById('apiModal').style.display='none';
  document.getElementById('keyStatus').textContent='已配置';
}

function handleInput(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,140)+'px';
  document.getElementById('sendBtn').className='send-btn'+(el.value.trim()?' active':'');
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }

function suggest(text){ document.getElementById('input').value=text; handleInput(document.getElementById('input')); send(); }

function newChat(){
  history=[];currentSession=null;
  const msgs=document.getElementById('messages');
  msgs.innerHTML='';
  const w=document.createElement('div');w.className='welcome';w.id='welcome';
  w.innerHTML=`<div class="welcome-title">你好，今天需要什么帮助？</div>
    <div class="welcome-sub">基于 Claude Sonnet 4.6 · 团队共用 · 开梯子即可访问</div>
    <div class="suggestions">
      <button class="sug-btn" onclick="suggest('帮我写一封给客户的道歉邮件，语气专业但诚恳')">✉️ 帮我写一封客户邮件</button>
      <button class="sug-btn" onclick="suggest('用简单易懂的话解释一下什么是人工智能')">💡 解释一个复杂概念</button>
      <button class="sug-btn" onclick="suggest('帮我列一个这周的工作计划，包括优先级排序')">📋 整理工作计划</button>
      <button class="sug-btn" onclick="suggest('帮我把这段话翻译成英文：今天天气不错，适合外出')">🌐 中英文翻译</button>
    </div>`;
  msgs.appendChild(w);
}

function addMsg(role, text){
  const w=document.getElementById('welcome');if(w)w.remove();
  const wrap=document.createElement('div');wrap.className='msg-wrap '+role;
  const av=document.createElement('div');av.className='msg-avatar '+role;av.textContent=role==='ai'?'AI':'我';
  const bubble=document.createElement('div');bubble.className='bubble '+role;bubble.textContent=text;
  if(role==='ai'){wrap.appendChild(av);wrap.appendChild(bubble);}
  else{wrap.appendChild(av);wrap.appendChild(bubble);}
  document.getElementById('messages').appendChild(wrap);
  document.getElementById('messages').scrollTop=99999;
  return bubble;
}

function addTyping(){
  const w=document.getElementById('welcome');if(w)w.remove();
  const wrap=document.createElement('div');wrap.className='msg-wrap ai';wrap.id='typing-wrap';
  const av=document.createElement('div');av.className='msg-avatar ai';av.textContent='AI';
  const bubble=document.createElement('div');bubble.className='bubble ai';
  bubble.innerHTML='<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  wrap.appendChild(av);wrap.appendChild(bubble);
  document.getElementById('messages').appendChild(wrap);
  document.getElementById('messages').scrollTop=99999;
}

function removeTyping(){ const t=document.getElementById('typing-wrap');if(t)t.remove(); }

function updateList(firstMsg){
  if(!currentSession){currentSession={id:Date.now(),title:firstMsg.slice(0,18)+(firstMsg.length>18?'...':'')};sessions.unshift(currentSession);}
  document.getElementById('chatList').innerHTML=sessions.map(s=>`<div class="chat-item${s.id===currentSession.id?' active':''}">${s.title}</div>`).join('');
}

async function send(){
  if(isLoading)return;
  if(!apiKey){ document.getElementById('apiModal').style.display='flex'; return; }
  const input=document.getElementById('input');
  const text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';
  document.getElementById('sendBtn').className='send-btn';
  isLoading=true;
  addMsg('user',text);updateList(text);
  history.push({role:'user',content:text});
  addTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:'你是一个专业、友善的AI助手，用简洁清晰的中文回答问题。',messages:history})
    });
    const data=await res.json();
    removeTyping();
    if(data.error){addMsg('ai','错误：'+data.error.message);isLoading=false;return;}
    const reply=data.content?.[0]?.text||'抱歉，发生了错误。';
    addMsg('ai',reply);
    history.push({role:'assistant',content:reply});
  }catch(e){
    removeTyping();
    addMsg('ai','连接失败，请检查：\n1. 梯子是否开启\n2. API Key 是否正确');
  }
  isLoading=false;
}
</script>
</body>
</html>
